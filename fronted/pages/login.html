<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔷Tradepilot</title>

<style>
/* PAGE BACKGROUND */
body {
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family:Arial, Helvetica, sans-serif;
  background: radial-gradient(circle at center,#0b1f3a,#020617);
  color:white;
}

/* FLOATING LOGIN BOX */
.login-container {
  width:360px;
  padding:40px;
  border-radius:14px;
  background:rgba(10,20,40,0.6);
  backdrop-filter: blur(10px);
  box-shadow:0 20px 40px rgba(0,0,0,0.7);
  text-align:center;
}

/* TITLE */
.login-container h2 {
  margin-bottom:25px;
}

/* INPUTS */
.input-group {
  margin-bottom:18px;
  text-align:left;
}
.input-group label {
  font-size:14px;
  color:#9ca3af;
}
.input-group input {
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:6px;
  border:1px solid rgba(255,255,255,0.1);
  background:#081a33;
  color:white;
  outline:none;
}

/* BUTTON */
.login-btn {
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}
.login-btn:hover {
  background:#1d4ed8;
}

/* FOOTER TEXT (signup) */
.footer-text {
  margin-top:18px;
  font-size:13px;
  color:#9ca3af;
}
.footer-text a {
  color:#3b82f6;
  text-decoration:none;
}

/* NEW FOOTER */
.main-footer {
  position:absolute;
  bottom:10px;
  font-size:13px;
  color:#64748b;
  text-align:center;
}

</style>
</head>

<body>

<div class="login-container">
  <h2>Tradepilot Login</h2>

  <form id="loginForm">
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>

    <button class="login-btn" type="submit">Login</button>
  </form>

  <p id="loginMessage"></p>

  <div class="footer-text">
    Don't have an account? <a href="register.html">Sign up</a>
  </div>
</div>

<!-- ✅ NEW INTERNAL FOOTER -->
<div class="main-footer">
  © 2026 Tradepilot — Automated Trading Platform
</div>

<script>
/* LOGIN HANDLER */
document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();

  let email = document.getElementById("email").value;

  document.getElementById("loginMessage").innerText =
    "Logged in successfully as " + email;
  document.getElementById("loginMessage").style.color = "lightgreen";

  sessionStorage.setItem("username", email);

  setTimeout(() => {
    window.location.href = "marketsdash.html";
  }, 1000);
});
</script>

</body>
</html>
