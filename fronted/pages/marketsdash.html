<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔷Tradepilot</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background: radial-gradient(circle at center,#0b1f3a,#020617);
  height:100vh;
  color:white;
}


.profile-pic{
  width:45px;
  height:45px;
  border-radius:50%;
  border:2px solid #22c55e;
}

/* slogan */
.slogan{
  text-align:center;
  margin-top:10px;
  color:#9ca3af;
  font-size:18px;
}

/* market intro */
.market-intro{
  text-align:center;
  margin-top:15px;
  margin-bottom:40px;
  font-size:16px;
  color:#cbd5f5;
  letter-spacing:1px;
}

/* market container */
.market-container{
  display:flex;
  justify-content:center;
  align-items:center;
}

.market-grid{
  display:grid;
  grid-template-columns:repeat(2,260px);
  gap:30px;
}

/* market cards */
.market-card{
  background:#081a33;
  border-radius:12px;
  padding:40px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.market-card:hover{
  transform:translateY(-8px) scale(1.05);
  background:#0f2a52;
  box-shadow:0 20px 40px rgba(0,0,0,0.7);
}

.market-title{
  font-size:22px;
  margin-bottom:10px;
}

.market-desc{
  color:#9ca3af;
  font-size:14px;
}
@media (max-width: 600px) {
  .market-grid {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div>
    <h2>Welcome, <span id="username">Trader</span> 👋</h2>
  
<!-- SLOGAN -->
<div class="slogan">
"Trade Smart. Stay Disciplined. Let the Market Reward Your Patience."
</div>

<!-- MARKET INTRO -->
<div class="market-intro">
Select a market to start trading
</div>

<!-- MARKET BUTTONS -->
<div class="market-container">
  <div class="market-grid">
    <div class="market-card" onclick="openMarket('deriv')">
      <div class="market-title">Deriv</div>
      <div class="market-desc">Trade synthetic indices and options</div>
    </div>

    <div class="market-card" onclick="openMarket('binance')">
      <div class="market-title">Binance</div>
      <div class="market-desc">Crypto spot and futures trading</div>
    </div>

    <div class="market-card" onclick="openMarket('coinbase')">
      <div class="market-title">Coinbase</div>
      <div class="market-desc">Bitcoin, Ethereum and altcoins</div>
    </div>

    <div class="market-card" onclick="openMarket('forex')">
      <div class="market-title">Forex</div>
      <div class="market-desc">Trade global currency pairs</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  // Get username and email from sessionStorage (set during login)
  const username = sessionStorage.getItem("username");
  const email = sessionStorage.getItem("email");

  // Display username
  if (username) {
    document.getElementById("username").innerText = username;
  }

  // Display profile picture using Gravatar
  if (email) {
    const hash = md5(email.trim().toLowerCase());
    document.getElementById("profilePic").src =
      "https://www.gravatar.com/avatar/" + hash + "?s=200&d=identicon";
  } else {
    document.getElementById("profilePic").src =
      "https://www.gravatar.com/avatar/?s=200&d=identicon";
  }
});

/* market navigation */
function openMarket(market){
  if(market=="deriv"){ window.location.href="derivhome.html"; }
  if(market=="binance"){ window.location.href="binancehome.html"; }
  if(market=="coinbase"){ window.location.href="coinbasehome.html"; }
  if(market=="forex"){ window.location.href="forexhome.html"; }
}
</script>

<div id="footer"></div>
<script>
fetch("../components/footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>

</body>
</html>
