<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔷Tradepilot</title>

<style>
/* PAGE BACKGROUND */
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial, Helvetica, sans-serif;
  background: radial-gradient(circle at center,#0b1f3a,#020617);
  color:white;
}

/* FLOATING REGISTER BOX */
.register-container {
  width:380px;
  padding:40px;
  border-radius:14px;
  background:rgba(10,20,40,0.6);
  backdrop-filter: blur(10px);
  box-shadow:0 20px 40px rgba(0,0,0,0.7);
  text-align:center;
}

/* TITLE */
.register-container h2 {
  margin-bottom:25px;
}

/* INPUT GROUP */
.input-group {
  margin-bottom:18px;
  text-align:left;
}
.input-group label {
  font-size:14px;
  color:#9ca3af;
}
.input-group input {
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:6px;
  border:1px solid rgba(255,255,255,0.1);
  background:#081a33;
  color:white;
  outline:none;
}

/* REGISTER BUTTON */
.register-btn {
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}
.register-btn:hover {
  background:#16a34a;
}

/* LOGIN LINK */
.login-link {
  margin-top:18px;
  font-size:13px;
  color:#9ca3af;
}
.login-link a {
  color:#3b82f6;
  text-decoration:none;
}
</style>
</head>

<body>
<div class="register-container">
  <h2>Create Account</h2>

  <form id="registerForm">
    <div class="input-group">
      <label>Username</label>
      <input type="text" id="username" required>
    </div>

    <div class="input-group">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>

    <div class="input-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" required>
    </div>

    <button class="register-btn" type="submit">Register</button>
  </form>

  <p id="registerMessage"></p>

  <div class="login-link">
    Already have an account? <a href="login.html">Login</a>
  </div>
</div>

<script>
/* REGISTER HANDLER */
document.getElementById("registerForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  let username = document.getElementById("username").value;
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  let confirmPassword = document.getElementById("confirmPassword").value;

  if (password !== confirmPassword) {
    document.getElementById("registerMessage").innerText = "Passwords do not match";
    return;
  }

  try {
    const res = await fetch("http://192.168.0.101:5000/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, email, password })
    });

    const data = await res.json();
    document.getElementById("registerMessage").innerText = data.message || data.error;

    if (res.status === 201) {
      // Redirect to login page after successful signup
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);
    }
  } catch (err) {
    document.getElementById("registerMessage").innerText = "Server error. Please try again.";
  }
});
</script>

<div id="footer"></div>
<script>
fetch("../components/footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>
</body>
</html>
