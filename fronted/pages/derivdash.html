<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TradePilot</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: #e2e8f0;
}

/* TOPBAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  background: rgba(15,23,42,0.95);
  align-items: center;
}

.logo { font-weight: bold; }

.account-info {
  display: flex;
  gap: 15px;
  align-items: center;
}

.demo {
  background: gold;
  padding: 3px 8px;
  border-radius: 10px;
  color: black;
}

.exit-btn {
  background: #ef4444;
  border: none;
  padding: 6px 10px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* DASHBOARD */
.dashboard {
  max-width: 1100px;
  margin: 30px auto;
  padding: 10px;
}

.card {
  background: rgba(30,41,59,0.6);
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

/* MODE */
.mode-options {
  display: flex;
  gap: 10px;
}

.mode-box {
  flex: 1;
  padding: 15px;
  background: #020617;
  border-radius: 10px;
  cursor: pointer;
  border: 2px solid transparent;
}

.mode-box.active {
  border-color: #22c55e;
}

.mode-desc {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 5px;
}

/* GRID */
.trade-controls {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); /* 🔥 increased */
  gap: 15px;
}

.input-group {
  display: flex;
  flex-direction: column;
  width: 100%;          /* 🔥 IMPORTANT */
  min-width: 0;         /* 🔥 prevents squeezing */
}
.input-group label {
  display: block;
}
label {
  font-size: 12px;
  margin-bottom: 5px;
  color: #94a3b8;
}

input, select {
  padding: 10px;
  border-radius: 6px;
  border: none;
  background: #020617;
  color: white;
}

/* BUTTON */
.run-btn {
  margin-top: 20px;
  width: 100%;
  padding: 15px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* STAKE MODE */
.stake-mode {
  display: flex;
  gap: 10px;
  margin-top: 8px;
}

.small-box {
  flex: 1;
  padding: 8px;
  background: #0f172a;
  border-radius: 6px;
  text-align: center;
  cursor: pointer;
  border: 1px solid transparent;
}

.small-box.active {
  border-color: #22c55e;
}

.hidden {
  display: none;
}

/* HISTORY */
table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  text-align: center;
}

.win { color: #22c55e; }
.loss { color: #ef4444; }

/* INTELLIGENCE */
.analysis-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.circle {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background: conic-gradient(#22c55e var(--p), #1e293b 0);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: bold;
}

.reason {
  background: #020617;
  padding: 15px;
  border-radius: 10px;
  font-size: 13px;
  color: #94a3b8;
}

.auto-panel {
  background: #020617;
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
  color: #94a3b8;
}

/* INPUT GROUP */
.input-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 100%;
}

/* LABEL */
.input-group label {
  font-size: 13px;
  color: #94a3b8;
  font-weight: 500;
}

/* SELECT WRAPPER */
.select-wrapper {
  position: relative;
  width: 100%;
}

/* SELECT FIELD */
.select-wrapper select {
  width: 100%;
  padding: 12px 40px 12px 14px;
  border-radius: 10px;
  border: 1px solid #1e293b;
  background: #020617;
  color: #fff;
  font-size: 14px;
  appearance: none;
  outline: none;
  transition: 0.3s ease;
  cursor: pointer;
}

/* HOVER + FOCUS */
.select-wrapper select:hover {
  border-color: #334155;
}

.select-wrapper select:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 1px #3b82f6;
}

/* DROPDOWN GROUP LABEL */
select optgroup {
  color: #94a3b8;
  background: #020617;
}

/* OPTIONS */
select option {
  background: #020617;
  color: #fff;
}

/* CUSTOM ARROW */
.select-wrapper .arrow {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #94a3b8;
  pointer-events: none;
  font-size: 14px;
}
/* 🔴 ERROR STATE */
.error {
  border: 1px solid #ef4444 !important;
  box-shadow: 0 0 8px rgba(239,68,68,0.6);
}

/* 📳 SHAKE ANIMATION */
@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
  100% { transform: translateX(0); }
}

.shake {
  animation: shake 0.3s ease;
}
.trade-buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}


input, select {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #334155; /* 🔥 visible border */
  background: #020617;
  color: white;
  font-size: 14px;
}

/* FOCUS EFFECT */
input:focus, select:focus {
  border-color: #22c55e;
  box-shadow: 0 0 0 1px #22c55e;
}
.trade-buttons {
  display: flex;
  gap: 10px;
  margin-top: 12px;
}

.trade-btn {
  flex: 1;
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s ease;
}

/* GREEN */
.btn-green {
  background: #22c55e;
}
.btn-green:hover {
  background: #16a34a;
  transform: scale(1.03);
}

/* RED */
.btn-red {
  background: #ef4444;
}
.btn-red:hover {
  background: #dc2626;
  transform: scale(1.03);
}
.trade-btn:active {
  transform: scale(0.97);
}
#manualTradePanel {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  align-items: end;
}
.trade-buttons {
  grid-column: 1 / -1; /* full width row */
  display: flex;
  justify-content: center;
  gap: 12px;
}
.error {
  border: 1px solid #ef4444 !important;
  box-shadow: 0 0 8px rgba(239,68,68,0.8);
  animation: blink 0.4s alternate 2;
}

@keyframes blink {
  from { box-shadow: 0 0 5px rgba(239,68,68,0.4); }
  to   { box-shadow: 0 0 12px rgba(239,68,68,1); }
}
</style>
</head>

<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="logo">🔷 TradePilot</div>

  <div class="account-info">
  <span id="balance">$0.00</span>
  <span id="accountId">-</span>
  <span id="accountType" class="demo">-</span>
  <button class="exit-btn" onclick="exitApp()">Exit</button>
</div>
</header>

<main class="dashboard">

<!-- MODE -->
<section class="card">
  <h3>Select Trading Mode</h3>

  <div class="mode-options">
    <div class="mode-box active" onclick="setMode('manual')" id="manualBox">
      🧠 Manual Trading
      <div class="mode-desc">You control all trades with insights</div>
    </div>

    <div class="mode-box" onclick="setMode('automatic')" id="autoBox">
      🤖 Automatic Bot
      <div class="mode-desc">AI executes trades with strategy engine</div>
    </div>
  </div>
</section>

<!-- TRADE SETUP -->
<div class="card">
  <h3>Trade Setup</h3>

  <div class="trade-controls">

<div class="input-group">
  <label for="market">Market</label>

  <div class="select-wrapper">
    <select id="market">
      
      <optgroup label="Standard Volatility">
        <option value="R_10">Volatility 10</option>
        <option value="R_25">Volatility 25</option>
        <option value="R_30">Volatility 30</option>
        <option value="R_50">Volatility 50</option>
        <option value="R_75">Volatility 75</option>
        <option value="R_90">Volatility 90</option>
        <option value="R_100" selected>Volatility 100</option>
      </optgroup>

      <optgroup label="Fast (1s)">
        <option value="1HZ10V">Volatility 10 (1s)</option>
        <option value="1HZ15V">Volatility 15 (1s)</option>
        <option value="1HZ25V">Volatility 25 (1s)</option>
        <option value="1HZ30V">Volatility 30 (1s)</option>
        <option value="1HZ50V">Volatility 50 (1s)</option>
        <option value="1HZ75V">Volatility 75 (1s)</option>
        <option value="1HZ100V">Volatility 100 (1s)</option>
      </optgroup>

    </select>
    <span class="arrow">⌄</span>
  </div>
</div>

    <div class="input-group">
      <label>Trade Type</label>
      <select id="tradeType">
        <option>Rise/Fall</option>
        <option>Higher/Lower</option>
        <option>Even/Odd</option>
        <option>Over/Under</option>
      </select>
    </div>

<div class="input-group hidden" id="manualStakeGroup"></div>
    <!-- AUTOMATIC MODE ONLY -->
    <div class="input-group" id="autoStakeGroup">
      <label>Stake Mode</label>

      <div class="stake-mode">
        <div class="small-box active" onclick="setStakeMode('auto')" id="autoStakeBox">
          AUTO (2% Balance)
        </div>

        <div class="small-box" onclick="setStakeMode('manual')" id="manualStakeBox">
          MANUAL
        </div>
      </div>

      <input type="number"
             id="manualStakeInput"
             class="hidden"
             placeholder="Enter custom stake">
    </div>

    <div class="input-group">
      <label>Take Profit</label>
      <input type="number" id="tp" placeholder="Secure your profits e.g 50">
    </div>

    <div class="input-group">
      <label>Stop Loss</label>
      <input type="number" id="sl" placeholder="Secure your money e.g 20">
    </div>

    <div class="input-group">
      <label>Loops</label>
      <input type="number" id="loops" placeholder="Number of trades e.g 5">
    </div>

    <div class="input-group">
      <label>Martingale(Fast loss recovery)</label>
      <select id="martingale">
        <option value="off">OFF</option>
        <option value="on">ON</option>
      </select>
    </div>

  </div>

  <button class="run-btn" onclick="startBot()">START BOT</button>
</div>

<!-- INTELLIGENCE -->
<div class="card">
  <h3>Market Intelligence</h3>

  <div class="analysis-grid">

    <div>
      <div class="circle" id="circle" style="--p:70%">70%</div>
      <p id="signal">Waiting for signal...</p>
    </div>

    <div class="reason" id="reasonBox"></div>

  </div>

  <div class="auto-panel" id="autoPanel"></div>
  <div id="manualTradePanel" class="auto-panel hidden"></div>
</div>


<!-- STATS -->
<div class="card" id="stats"></div>

<!-- HISTORY -->
<div class="card">
  <h3>Trade History</h3>

  <table>
    <thead>
      <tr>
        <th>Time</th>
        <th>Market</th>
        <th>Type</th>
        <th>Stake</th>
        <th>Status</th>
        <th>P/L</th>
      </tr>
    </thead>
    <tbody id="history"></tbody>
  </table>
</div>

</main>

<script>

let mode = "manual";
let stakeMode = "auto";
let botInterval = null;
const manualBox = document.getElementById("manualBox");
const autoBox = document.getElementById("autoBox");

const autoStakeBox = document.getElementById("autoStakeBox");
const manualStakeBox = document.getElementById("manualStakeBox");

/* 🔥 MANUAL ANALYSIS STATE */
let manualAnalysisActive = false;
let manualAnalysisInterval = null;

/* =========================
   INIT
========================= */
window.onload = function () {

  setMode("manual");
  setStakeMode("auto");
  initDashboard();
  pollBot();
};

/* =========================
   MODE SWITCH
========================= */
function setMode(m){
  mode = m;

  manualBox.classList.toggle("active", m==="manual");
  autoBox.classList.toggle("active", m==="automatic");

  document.getElementById("manualStakeGroup").style.display =
    m==="manual" ? "block" : "none";

  document.getElementById("autoStakeGroup").style.display =
    m==="automatic" ? "block" : "none";

  document.getElementById("tp").parentElement.style.display =
    m==="automatic" ? "block" : "none";

  document.getElementById("sl").parentElement.style.display =
    m==="automatic" ? "block" : "none";

  document.getElementById("loops").parentElement.style.display =
    m==="automatic" ? "block" : "none";

  document.getElementById("martingale").parentElement.style.display =
    m==="automatic" ? "block" : "none";

  const btn = document.querySelector(".run-btn");

  if(m === "manual"){
    btn.innerText = "GET ENTRY ANALYSIS";
    btn.style.background = "#22c55e";
  } else {
    btn.innerText = "START BOT";
    btn.style.background = "#22c55e";
  }
}

/* =========================
   STAKE MODE
========================= */
function setStakeMode(m){
  stakeMode = m;

  autoStakeBox.classList.toggle("active", m==="auto");
  manualStakeBox.classList.toggle("active", m==="manual");

  document.getElementById("manualStakeInput")
    .classList.toggle("hidden", m==="auto");
}

/* =========================
   VALIDATION SYSTEM
========================= */
function validateInputs(){

  let valid = true;

  function mark(id){
    const el = document.getElementById(id);

    if(!el) return;

    if(!el.value || el.value.trim() === ""){
      el.classList.add("error", "shake");
      setTimeout(()=> el.classList.remove("shake"), 300);
      valid = false;
    } else {
      el.classList.remove("error");
    }
  }

  // always required
  mark("market");
  mark("tradeType");

  // manual mode
  if(mode === "manual"){
    
  }

  // automatic mode
  if(mode === "automatic"){
    if(stakeMode === "manual"){
      mark("manualStakeInput");
    }
    mark("tp");
    mark("sl");
    mark("loops");
  }

  return valid;
}

/* =========================
   MAIN BUTTON HANDLER
========================= */
function startBot(){

  const btn = document.querySelector(".run-btn");
 

  /* ❌ BLOCK IF INVALID */
  if(!validateInputs()){
    btn.innerText = "FILL ALL REQUIRED FIELDS";
    btn.style.background = "#ef4444";

    setTimeout(()=>{
      if(mode === "manual"){
        btn.innerText = manualAnalysisActive
          ? "STOP ENTRY ANALYSIS"
          : "GET ENTRY ANALYSIS";
      } else {
        btn.innerText = botInterval ? "STOP BOT" : "START BOT";
      }
      btn.style.background = "#22c55e";
    }, 1500);

    return;
  }

  /* =========================
     🧠 MANUAL MODE
  ========================= */
  if(mode === "manual"){

    if(manualAnalysisActive){
      clearInterval(manualAnalysisInterval);
      manualAnalysisInterval = null;
      manualAnalysisActive = false;

      btn.innerText = "GET ENTRY ANALYSIS";
      btn.style.background = "#22c55e";
      return;
    }

    manualAnalysisActive = true;
     renderManualTradeUI();

    btn.innerText = "STOP ENTRY ANALYSIS";
    btn.style.background = "#ef4444";

    runIntelligence();

    manualAnalysisInterval = setInterval(()=>{
      runIntelligence();
    }, 1200);

    return;
  }

  /* =========================
     🤖 AUTOMATIC BOT
  ========================= */


  btn.innerText = "STOP BOT";
  btn.style.background = "#ef4444";

  /* =========================
   🤖 AUTOMATIC BOT (SAFE VERSION)
========================= */

if(botInterval){
  clearInterval(botInterval);
  botInterval = null;

  btn.innerText = "START BOT";
  btn.style.background = "#22c55e";
  return;
}

/* ONLY UI STATE CHANGE */
btn.innerText = "CONNECTING...";
btn.style.background = "#f59e0b";
console.log("TOKEN:", localStorage.getItem("deriv_token"));

/* CALL BACKEND (NON-BLOCKING) */
fetch("http://127.0.0.1:5000/start", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    market: document.getElementById("market").value,
    tradeType: document.getElementById("tradeType").value,
    stake: document.getElementById("stake").value,
    loops: document.getElementById("loops").value,
    tp: document.getElementById("tp").value,
    sl: document.getElementById("sl").value,
    martingale: document.getElementById("martingale").value
  })
})
.then(res => res.json())
.then(data => {

  console.log("BOT STARTED:", data);

  /* DO NOT TOUCH OTHER UI FEATURES */
  btn.innerText = "BOT RUNNING...";
  btn.style.background = "#ef4444";

})
.catch(err => {

  console.log(err);

  btn.innerText = "START BOT";
  btn.style.background = "#22c55e";
});
}

/* =========================
   INTELLIGENCE
========================= */
function runIntelligence(){

  let confidence = Math.floor(Math.random()*25+70);

  circle.style.setProperty("--p",confidence+"%");
  document.getElementById("circle").innerText = confidence + "%";

  signal.innerText = "Signal updating...";
  reasonBox.innerText = "Market structure + momentum analysis active.";

  if(mode==="automatic"){
    autoPanel.innerText =
      `AUTO MODE → executing trades at ${confidence}% confidence`;
  } else {
    autoPanel.innerText =
      `MANUAL MODE → Suggested entry at ${confidence}% confidence`;
  }
}

/* =========================
   STATS
========================= */
function updateStats(p,w,l,c){
  stats.innerHTML = `Profit: $${p.toFixed(2)} | Trades: ${c}`;
}

/* =========================
   HISTORY
========================= */
function addRow(stake,status,res){
  history.innerHTML += `
    <tr>
      <td>${new Date().toLocaleTimeString()}</td>
      <td>${market.value}</td>
      <td>${tradeType.value}</td>
      <td>$${stake}</td>
      <td>${status}</td>
      <td class="${res>0?'win':'loss'}">${res.toFixed(2)}</td>
    </tr>
  `;
}

function pollBot(){

  setInterval(async () => {

    const res = await fetch("http://127.0.0.1:5000/status");
    const data = await res.json();

    // ✅ Update stats (profit + number of trades)
    updateStats(data.profit, 0, 0, data.trades);

    // ✅ Clear table first
    const table = document.getElementById("history");
    table.innerHTML = "";

    // ✅ Add each trade
    data.history.forEach(trade => {

      addRow(
        trade.stake,
        trade.result > 0 ? "WIN" : "LOSS",
        trade.result
      );

    });

  }, 1000); // every 1 second

}
/* =========================
   EXIT
========================= */
function exitApp(){
  // clear saved user session
  localStorage.removeItem("user");
  localStorage.removeItem("deriv_token");

  // redirect to home page
  window.location.href = "marketsdash.html";
}


function initDashboard(){

  const user = JSON.parse(localStorage.getItem("user"));

  if(!user){
    console.log("No user session");
    return;
  }

  document.getElementById("balance").innerText = `$${user.balance}`;
  document.getElementById("accountId").innerText = user.account_id;
  document.getElementById("accountType").innerText = user.account_type;

  if(user.account_type === "Demo"){
    document.getElementById("accountType").classList.add("demo");
  }
}

  <div class="select-wrapper">

        <option value="10t">10 Ticks</option>
      </optgroup>

      <optgroup label="Minutes">

        <option value="10m">10 Minutes</option>
      </optgroup>

    </select>

    <span class="arrow">⌄</span>
  </div>
</div>
      </div>

      <div class="trade-buttons">
        <button class="trade-btn btn-green" onclick="placeManualTrade('rise')">RISE</button>
        <button class="trade-btn btn-red" onclick="placeManualTrade('fall')">FALL</button>
      </div>
    `;
  }

  /* =========================
     EVEN / ODD
  ========================= */
  else if(tradeType === "Even/Odd"){
    html = `
      <h4>Execute Trade</h4>

      <div class="input-group">
        <label>Stake</label>
        <input type="number" id="m_stake" placeholder="Enter stake">
      </div>

      <div class="input-group">
        <div class="input-group">
  <label>Duration</label>

  <div class="select-wrapper">
    <select id="duration">

      <optgroup label="Ticks">
        <option value="1t">1 Tick</option>
        <option value="2t">2 Ticks</option>
        <option value="3t">3 Ticks</option>
        <option value="4t">4 Ticks</option>
        <option value="5t">5 Ticks</option>
        <option value="10t">10 Ticks</option>
      </optgroup>

    </select>

    <span class="arrow">⌄</span>
  </div>
</div>
      </div>

      <div class="trade-buttons">
        <button class="trade-btn btn-green" onclick="placeManualTrade('even')">EVEN</button>
        <button class="trade-btn btn-red" onclick="placeManualTrade('odd')">ODD</button>
      </div>
    `;
  }

  /* =========================
     OVER / UNDER
  ========================= */
  else if(tradeType === "Over/Under"){
    html = `
      <h4>Execute Trade</h4>

      <div class="input-group">
        <label>Stake</label>
        <input type="number" id="m_stake" placeholder="Enter stake">
      </div>

      <div class="input-group">
        <div class="input-group">
  <label>Duration</label>

  <div class="select-wrapper">
    <select id="duration">

      <optgroup label="Ticks">
        <option value="1t">1 Tick</option>
        <option value="2t">2 Ticks</option>
        <option value="3t">3 Ticks</option>
        <option value="4t">4 Ticks</option>
        <option value="5t">5 Ticks</option>
        <option value="10t">10 Ticks</option>
      </optgroup>

    </select>

    <span class="arrow">⌄</span>
  </div>
</div>
      </div>

      <div class="input-group">
        <label>Barrier Digit (0–9)</label>
        <input type="number" id="digit" min="0" max="9" placeholder="Enter digit">
      </div>

      <div class="trade-buttons">
        <button class="trade-btn btn-green" onclick="placeManualTrade('over')">OVER</button>
        <button class="trade-btn btn-red" onclick="placeManualTrade('under')">UNDER</button>
      </div>
    `;
  }

  /* =========================
     HIGHER / LOWER
  ========================= */
  else if(tradeType === "Higher/Lower"){
    html = `
      <h4>Execute Trade</h4>

      <div class="input-group">
        <label>Stake</label>
        <input type="number" id="m_stake" placeholder="Enter stake">
      </div>

  
      <div class="input-group">
        <label>Duration</label>
        <div class="input-group">
    <div class="select-wrapper">
    <select id="duration">

      <optgroup label="Ticks">
        <option value="1t">1 Tick</option>
        <option value="2t">2 Ticks</option>
        <option value="3t">3 Ticks</option>
        <option value="4t">4 Ticks</option>
        <option value="5t">5 Ticks</option>
        <option value="10t">10 Ticks</option>
      </optgroup>

      <optgroup label="Minutes">
        <option value="1m">1 Minute</option>
        <option value="2m">2 Minutes</option>
        <option value="3m">3 Minutes</option>
        <option value="5m">5 Minutes</option>
        <option value="10m">10 Minutes</option>
      </optgroup>

    </select>

    <span class="arrow">⌄</span>
  </div>
</div>
      </div>

      <div class="input-group">
        <label>Barrier</label>
        <input type="number" id="barrier" placeholder="Enter barrier">
      </div>

      <div class="trade-buttons">
        <button class="trade-btn btn-green" onclick="placeManualTrade('higher')">HIGHER</button>
        <button class="trade-btn btn-red" onclick="placeManualTrade('lower')">LOWER</button>
      </div>
    `;
  }

  panel.innerHTML = html;
  panel.classList.remove("hidden");
}
  
function placeManualTrade(direction){

  if(!validateManualTrade()){
    console.log("❌ Invalid inputs");
    return;
  }

  const stake = document.getElementById("m_stake").value;
  const duration = document.getElementById("duration").value;
  const market = document.getElementById("market").value;
  const tradeType = document.getElementById("tradeType").value;

  console.log("✅ Manual Trade:", {
    direction,
    stake,
    duration,
    market,
    tradeType
  });


  // 🔥 Send to backend (later)
}
function validateManualTrade(){

  let valid = true;

  function mark(id){
    const el = document.getElementById(id);
    if(!el) return;

    if(!el.value || el.value.trim() === ""){
      el.classList.add("error", "shake");

      setTimeout(()=>{
        el.classList.remove("shake");
      }, 300);

      valid = false;
    } else {
      el.classList.remove("error");
    }
  }

  const tradeType = document.getElementById("tradeType").value;

  // COMMON
  mark("m_stake");
  mark("duration");

  // CONDITIONAL
  if(tradeType === "Over/Under"){
    mark("digit");
  }

  if(tradeType === "Higher/Lower"){
    mark("barrier");
  }

  return valid;
}
</script>
