<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TradePilot Pro</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: #e2e8f0;
}

/* TOPBAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  background: rgba(15,23,42,0.95);
}

.logo { font-weight: bold; }

.account-info {
  display: flex;
  gap: 15px;
  align-items: center;
}

.demo { background: gold; padding: 3px 8px; border-radius: 10px; }

/* DASHBOARD */
.dashboard {
  max-width: 1100px;
  margin: 30px auto;
  padding: 10px;
}

/* CARD */
.card {
  background: rgba(30,41,59,0.6);
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

/* MODE */
.mode-options {
  display: flex;
  gap: 10px;
}

.mode-box {
  flex: 1;
  padding: 15px;
  background: #020617;
  border-radius: 10px;
  cursor: pointer;
  border: 2px solid transparent;
}

.mode-box.active {
  border-color: #22c55e;
}

/* GRID */
.trade-controls {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 15px;
}

.input-group {
  display: flex;
  flex-direction: column;
}

.input-group label {
  font-size: 13px;
  margin-bottom: 5px;
}

input, select {
  padding: 10px;
  border-radius: 6px;
  border: none;
  background: #020617;
  color: white;
}

/* BUTTON */
.run-btn {
  margin-top: 20px;
  padding: 15px;
  width: 100%;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  text-align: center;
}

.win { color: #22c55e; }
.loss { color: red; }
</style>
</head>

<body>

<header class="topbar">
  <div class="logo">🔷 TradePilot</div>
  <div class="account-info">
    <span>$288.44</span>
    <span class="demo">DEMO</span>
  </div>
</header>

<main class="dashboard">

<!-- MODE -->
<div class="card">
  <h3>Trading Mode</h3>
  <div class="mode-options">
    <div class="mode-box active" onclick="setMode('manual')" id="manualBox">Manual</div>
    <div class="mode-box" onclick="setMode('automatic')" id="autoBox">Automatic</div>
  </div>
</div>

<!-- SETUP -->
<div class="card">
  <h3>Trade Setup</h3>

  <div class="trade-controls">

    <div class="input-group">
      <label>Market</label>
      <select id="market">
        <option>Volatility 100</option>
        <option>Boom 500</option>
      </select>
    </div>

    <div class="input-group">
      <label>Trade Type</label>
      <select id="tradeType">
        <option>Rise/Fall</option>
      </select>
    </div>

    <!-- MANUAL STAKE -->
    <div class="input-group" id="stakeCard">
      <label>Stake</label>
      <input type="number" id="stake" placeholder="10">
    </div>

    <!-- AUTO STAKE -->
    <div id="autoStakeSection" style="display:none;">
      <label>Stake Mode</label>

      <div class="mode-options">
        <div class="mode-box active" onclick="setStakeMode('auto')" id="autoStakeBox">Auto</div>
        <div class="mode-box" onclick="setStakeMode('manual')" id="manualStakeBox">Manual</div>
      </div>

      <input type="number" id="manualStakeValue" placeholder="Enter stake" style="display:none;margin-top:10px;">
    </div>

    <div class="input-group">
      <label>Take Profit</label>
      <input type="number" id="tp" placeholder="20">
    </div>

    <div class="input-group">
      <label>Stop Loss</label>
      <input type="number" id="sl" placeholder="10">
    </div>

    <div class="input-group">
      <label>Loop Count</label>
      <input type="number" id="loops" placeholder="5">
    </div>

    <div class="input-group">
      <label>Martingale</label>
      <select id="martingale">
        <option value="off">OFF</option>
        <option value="on">ON</option>
      </select>
    </div>

  </div>

  <button class="run-btn" onclick="startBot()">START BOT</button>
</div>

<!-- STATS -->
<div class="card" id="stats"></div>

<!-- HISTORY -->
<div class="card">
  <h3>History</h3>
  <table>
    <thead>
      <tr>
        <th>Time</th>
        <th>Stake</th>
        <th>Result</th>
      </tr>
    </thead>
    <tbody id="history"></tbody>
  </table>
</div>

</main>

<script>
let mode = "manual";
let stakeMode = "auto";

function setMode(m) {
  mode = m;
  manualBox.classList.toggle("active", m==="manual");
  autoBox.classList.toggle("active", m==="automatic");

  stakeCard.style.display = m==="manual" ? "block" : "none";
  autoStakeSection.style.display = m==="automatic" ? "block" : "none";
}

function setStakeMode(m) {
  stakeMode = m;
  autoStakeBox.classList.toggle("active", m==="auto");
  manualStakeBox.classList.toggle("active", m==="manual");

  manualStakeValue.style.display = m==="manual" ? "block" : "none";
}

function startBot() {

  let profit = 0;
  let wins = 0;
  let losses = 0;
  let count = 0;

  let baseStake = Number(stake.value) || 10;
  let currentStake = baseStake;

  let tp = Number(tpInput()) || 20;
  let sl = Number(slInput()) || 10;
  let loops = Number(loopInput()) || 5;
  let martingale = document.getElementById("martingale").value;

  let interval = setInterval(()=>{

    let stake;

    if(mode==="automatic"){
      if(stakeMode==="auto"){
        stake = (288.44*0.02).toFixed(2);
      } else {
        stake = Number(manualStakeValue.value)||10;
      }
    } else {
      stake = currentStake;
    }

    let win = Math.random()>0.5;
    let result = win ? stake*0.8 : -stake;

    profit += result;
    count++;

    if(win){
      wins++;
      currentStake = baseStake;
    } else {
      losses++;
      if(martingale==="on") currentStake *= 2;
    }

    updateStats(profit,wins,losses,count);
    addRow(stake,result);

    if(profit>=tp || profit<=-sl || count>=loops){
      clearInterval(interval);
    }

  },1500);
}

function updateStats(p,w,l,c){
  let winRate = ((w/(w+l))*100 || 0).toFixed(1);

  stats.innerHTML = `
    <h3>Bot Running</h3>
    <p>Profit: $${p.toFixed(2)}</p>
    <p>Trades: ${c}</p>
    <p>Wins: ${w} | Losses: ${l}</p>
    <p>Win Rate: ${winRate}%</p>
  `;
}

function addRow(stake,res){
  history.innerHTML += `
    <tr>
      <td>${new Date().toLocaleTimeString()}</td>
      <td>$${stake}</td>
      <td class="${res>0?'win':'loss'}">${res.toFixed(2)}</td>
    </tr>
  `;
}

function tpInput(){ return document.getElementById("tp").value }
function slInput(){ return document.getElementById("sl").value }
function loopInput(){ return document.getElementById("loops").value }

</script>

</body>
</html>
