<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TradePilot Pro</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: #e2e8f0;
}

/* TOPBAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  background: rgba(15,23,42,0.95);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logo { font-weight: bold; font-size: 20px; }

.account-info {
  display: flex;
  align-items: center;
  gap: 15px;
}

.account-type {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
}

.demo { background: gold; color: black; }

.logout-btn {
  background: red;
  border: none;
  padding: 6px 10px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* DASHBOARD */
.dashboard {
  max-width: 1100px;
  margin: 30px auto;
  padding: 0 15px;
}

/* CARD */
.card {
  background: rgba(30,41,59,0.6);
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

/* MODE */
.mode-options {
  display: flex;
  gap: 15px;
}

.mode-box {
  flex: 1;
  padding: 15px;
  border-radius: 10px;
  background: #020617;
  cursor: pointer;
  border: 2px solid transparent;
  transition: 0.3s;
}

.mode-box:hover {
  border-color: #22c55e;
}

.mode-box.active {
  border-color: #22c55e;
}

/* INPUT GRID (FIXED OVERLAP) */
.trade-controls {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  margin-top: 15px;
}

.input-group {
  display: flex;
  flex-direction: column;
}

.input-group label {
  font-size: 13px;
  margin-bottom: 5px;
  color: #94a3b8;
}

.input-group input,
select {
  padding: 10px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.08);
  background: #020617;
  color: white;
  font-size: 14px;
  width: 100%;
  box-sizing: border-box;
}

.input-group input:focus,
select:focus {
  outline: none;
  border-color: #22c55e;
}

/* BUTTON */
.run-btn {
  margin-top: 20px;
  width: 100%;
  padding: 15px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.win { color: #22c55e; }
.loss { color: red; }
</style>
</head>

<body>

<header class="topbar">
  <div class="logo">🔷 TradePilot</div>

  <div class="account-info">
    <span>$288.44</span>
    <span>VRTC14409258</span>
    <span class="account-type demo">DEMO</span>
    <button class="logout-btn" onclick="logout()">Exit</button>
  </div>
</header>

<main class="dashboard">

<!-- MODE -->
<section class="card">
  <h3>Trading Mode</h3>

  <div class="mode-options">
    <div class="mode-box active" onclick="setMode('manual')" id="manualBox">
      🧠 Manual Trading
      <p>You control trades</p>
    </div>

    <div class="mode-box" onclick="setMode('automatic')" id="autoBox">
      🤖 Automatic Bot
      <p>Bot trades for you</p>
    </div>
  </div>
</section>

<!-- TRADE SETUP -->
<section class="card">
  <h3>Trade Setup</h3>

  <div class="trade-controls">

    <div class="input-group">
      <label>Market</label>
      <select id="market">
        <option>Volatility 100</option>
        <option>Boom 500</option>
        <option>Crash 1000</option>
      </select>
    </div>

    <div class="input-group">
      <label>Trade Type</label>
      <select id="tradeType">
        <option>Rise/Fall</option>
        <option>Even/Odd</option>
      </select>
    </div>

    <div class="input-group" id="stakeCard">
      <label>Stake Amount</label>
      <input type="number" id="stake" placeholder="e.g 10">
    </div>

    <div class="input-group">
      <label>Take Profit ($)</label>
      <input type="number" id="takeProfit" placeholder="e.g 20">
    </div>

    <div class="input-group">
      <label>Stop Loss ($)</label>
      <input type="number" id="stopLoss" placeholder="e.g 10">
    </div>

    <div class="input-group">
      <label>Auto Loop (Trades)</label>
      <input type="number" id="loopCount" placeholder="e.g 5">
    </div>

  </div>

  <button class="run-btn" onclick="startBot()">START BOT</button>
</section>

<!-- STATUS -->
<section class="card" id="statsBox"></section>

<!-- HISTORY -->
<section class="card">
  <h3>Trade History</h3>

  <table>
    <thead>
      <tr>
        <th>Time</th>
        <th>Market</th>
        <th>Type</th>
        <th>Stake</th>
        <th>Status</th>
        <th>P/L</th>
      </tr>
    </thead>

    <tbody id="historyTable"></tbody>
  </table>
</section>

</main>

<script>
let mode = "manual";
let running = false;

/* MODE */
function setMode(selected) {
  mode = selected;

  document.getElementById("manualBox").classList.remove("active");
  document.getElementById("autoBox").classList.remove("active");

  if (selected === "manual") {
    document.getElementById("manualBox").classList.add("active");
  } else {
    document.getElementById("autoBox").classList.add("active");
  }
}

/* BOT LOOP */
function startBot() {
  if (running) return;

  running = true;

  let profit = 0;
  let count = 0;

  const takeProfit = Number(document.getElementById("takeProfit").value) || 20;
  const stopLoss = Number(document.getElementById("stopLoss").value) || 10;
  const loops = Number(document.getElementById("loopCount").value) || 5;

  const statsBox = document.getElementById("statsBox");

  let interval = setInterval(() => {

    let stake = Number(document.getElementById("stake").value) || 10;

    let result = Math.random() > 0.5 ? stake * 0.8 : -stake;
    profit += result;
    count++;

    statsBox.innerHTML = `
      <h3>🤖 Bot Running</h3>
      <p>Total Profit: $${profit.toFixed(2)}</p>
      <p>Trades: ${count}/${loops}</p>
    `;

    addHistory(stake, result);

    if (profit >= takeProfit || profit <= -stopLoss || count >= loops) {
      clearInterval(interval);
      running = false;

      statsBox.innerHTML += `<p><strong>Bot Stopped</strong></p>`;
    }

  }, 1500);
}

/* HISTORY */
function addHistory(stake, result) {
  const history = document.getElementById("historyTable");

  const row = `
    <tr>
      <td>${new Date().toLocaleTimeString()}</td>
      <td>${document.getElementById("market").value}</td>
      <td>${document.getElementById("tradeType").value}</td>
      <td>$${stake}</td>
      <td>${result > 0 ? "Won" : "Lost"}</td>
      <td class="${result > 0 ? 'win' : 'loss'}">${result.toFixed(2)}</td>
    </tr>
  `;

  history.innerHTML += row;
}

/* LOGOUT */
function logout() {
  alert("Logging out...");
}
</script>

</body>
</html>
